; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:pico]

platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipico2
framework = arduino
board_build.core = earlephilhower

board_upload.maximum_size = 2097152
board_build.mcu = rp2350-riscv

build_flags =
    -D TARGET_RP2040
    -D PICO_DEFAULT_FLOAT_IMPL=pico_dcp
    ; pico 2 has broken trigonometry functions with default float implementation
    ; https://github.com/raspberrypi/pico-sdk/issues/2406

board_microros_user_meta = colcon.meta
board_microros_distro = jazzy
board_microros_transport = serial
lib_ldf_mode = chain+
lib_deps = 
    adafruit/Adafruit NeoPixel@^1.15.4
    https://github.com/Bento-Robotics/micro_rosso_platformio.git ;version with rp2040 support

